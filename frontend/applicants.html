<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Connect — Applicants</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
<script>
if (!requireAuth()) throw new Error();
const userId = getUserId();
const role = getRole();
const params = new URLSearchParams(window.location.search);
const filterJobId = params.get('jobId');
let notifications = [], applications = [], myJobs = [], students = {};

async function init() {
  const nr = await apiFetch(`/api/notifications?userId=${userId}`);
  notifications = await nr.json();
  const unread = notifications.filter(n=>!n.isRead).length;

  document.getElementById('root').innerHTML = `
    <div class="app-shell">
      ${renderHeader(getName(), role, unread)}
      ${renderSidebar(role)}
      <main class="main-content" id="mainContent"><div class="loading-spinner"></div></main>
    </div>
    ${renderNotifPanel(notifications)}
  `;

  const [jobsRes, appsRes, usersRes] = await Promise.all([
    apiFetch(`/api/jobs?recruiterId=${userId}`),
    apiFetch('/api/applications'),
    apiFetch('/api/admin/users?role=STUDENT')
  ]);
  myJobs = await jobsRes.json();
  const allApps = await appsRes.json();
  const usersData = await usersRes.json();

  // Map studentId -> student
  (usersData.students || []).forEach(s => { students[s.userId] = s; });

  // Filter applications to my jobs
  const myJobIds = new Set(myJobs.map(j => j.jobId));
  applications = allApps.filter(a => myJobIds.has(a.jobId));
  if (filterJobId) applications = applications.filter(a => a.jobId === filterJobId);

  renderPage();
}

function renderPage() {
  const mc = document.getElementById('mainContent');
  const jobTitle = filterJobId ? (myJobs.find(j=>j.jobId===filterJobId)||{}).title || 'Job' : 'All Jobs';

  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">
        <h2>👥 Applicants${filterJobId ? ` — ${jobTitle}` : ''}</h2>
        <p>${applications.length} application(s)</p>
      </div>
      ${filterJobId ? '<a href="applicants.html" class="btn btn-secondary">← All Applicants</a>' : ''}
    </div>

    <div class="filter-bar">
      <select class="filter-select" id="jobFilter" onchange="filterApps()">
        <option value="">All Jobs</option>
        ${myJobs.map(j=>`<option value="${j.jobId}" ${j.jobId===filterJobId?'selected':''}>${j.title}</option>`).join('')}
      </select>
      <select class="filter-select" id="statusFilter" onchange="filterApps()">
        <option value="">All Statuses</option>
        <option>APPLIED</option><option>SHORTLISTED</option><option>INTERVIEW_SCHEDULED</option>
        <option>SELECTED</option><option>REJECTED</option>
      </select>
    </div>

    <div id="appsList"></div>
    <div id="scheduleModal"></div>
  `;
  renderAppsList(applications);
}

let filteredApps = [];
function filterApps() {
  const jobId = document.getElementById('jobFilter').value;
  const status = document.getElementById('statusFilter').value;
  const myJobIds = new Set(myJobs.map(j=>j.jobId));
  filteredApps = applications.filter(a => {
    if (jobId && a.jobId !== jobId) return false;
    if (status && a.status !== status) return false;
    return true;
  });
  renderAppsList(filteredApps);
}

function renderAppsList(apps) {
  const container = document.getElementById('appsList');
  if (apps.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><h3>No applicants found</h3></div>`;
    return;
  }
  container.innerHTML = apps.map(a => {
    const student = students[a.studentId] || {};
    return `<div class="card" style="margin-bottom:12px" id="app-${a.applicationId}">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div class="applicant-avatar" style="width:48px;height:48px;font-size:1.1rem;border-radius:12px;flex-shrink:0">
          ${(student.name||'S').charAt(0)}
        </div>
        <div style="flex:1;min-width:200px">
          <div style="font-weight:700">${student.name || a.studentId}</div>
          <div class="text-muted text-sm">${student.department||''} ${student.year?'• Year '+student.year:''} ${student.cgpa?'• CGPA '+student.cgpa:''}</div>
          <div style="margin-top:6px">
            <div style="font-size:.875rem;font-weight:600">${a.jobTitle}</div>
            <div class="text-xs text-muted">${a.companyName} • Applied ${formatDate(a.appliedDate)}</div>
          </div>
          ${student.skills&&student.skills.length>0 ? `<div class="job-skills" style="margin-top:8px">${student.skills.slice(0,5).map(s=>`<span class="skill-tag">${s}</span>`).join('')}${student.skills.length>5?`<span class="text-xs text-muted">+${student.skills.length-5} more</span>`:''}</div>` : ''}
          ${a.coverLetter ? `<div style="margin-top:8px;padding:8px;background:var(--bg);border-radius:6px;font-size:.8rem;color:var(--text-muted)">"${a.coverLetter.substring(0,120)}..."</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${statusBadge(a.status)}
          <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
            ${a.status === 'APPLIED' ? `
              <button class="btn btn-success btn-sm" onclick="updateStatus('${a.applicationId}','SHORTLISTED')">⭐ Shortlist</button>
              <button class="btn btn-danger btn-sm" onclick="updateStatus('${a.applicationId}','REJECTED')">❌ Reject</button>` : ''}
            ${a.status === 'SHORTLISTED' ? `
              <button class="btn btn-primary btn-sm" onclick="openSchedule('${a.applicationId}','${a.studentId}','${a.jobId}')">📅 Schedule Interview</button>
              <button class="btn btn-success btn-sm" onclick="updateStatus('${a.applicationId}','SELECTED')">✅ Select</button>
              <button class="btn btn-danger btn-sm" onclick="updateStatus('${a.applicationId}','REJECTED')">❌ Reject</button>` : ''}
            ${a.status === 'INTERVIEW_SCHEDULED' ? `
              <button class="btn btn-success btn-sm" onclick="updateStatus('${a.applicationId}','SELECTED')">✅ Select</button>
              <button class="btn btn-danger btn-sm" onclick="updateStatus('${a.applicationId}','REJECTED')">❌ Reject</button>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function updateStatus(appId, status, note='') {
  await apiFetch('/api/applications/update', { method:'POST', body: JSON.stringify({ applicationId: appId, status, note }) });
  showToast(`Status updated to ${status}`);
  // Refresh
  const r = await apiFetch('/api/applications');
  const all = await r.json();
  const myJobIds = new Set(myJobs.map(j=>j.jobId));
  applications = all.filter(a=>myJobIds.has(a.jobId));
  renderAppsList(applications);
}

let currentApp = {};
function openSchedule(appId, studentId, jobId) {
  currentApp = { appId, studentId, jobId };
  document.getElementById('scheduleModal').innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-title">📅 Schedule Interview</div>
        <div id="schedAlert"></div>
        <div class="form-row">
          <div class="form-group"><label>Date & Time *</label>
            <input type="datetime-local" id="intDateTime" /></div>
          <div class="form-group"><label>Interview Type</label>
            <select id="intType">
              <option value="ONLINE">Online</option>
              <option value="OFFLINE">Offline</option>
              <option value="PHONE">Phone</option>
              <option value="GROUP_DISCUSSION">Group Discussion</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Venue / Meeting Link</label>
          <input type="text" id="intVenue" placeholder="Google Meet link or physical address" /></div>
        <div class="form-group"><label>Notes for Candidate</label>
          <textarea id="intNotes" rows="3" placeholder="Round 1: DSA + System Design..."></textarea></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeSchedule()">Cancel</button>
          <button class="btn btn-primary" onclick="submitSchedule()">Schedule Interview</button>
        </div>
      </div>
    </div>
  `;
}
function closeSchedule() { document.getElementById('scheduleModal').innerHTML = ''; }

async function submitSchedule() {
  const dt = document.getElementById('intDateTime').value;
  if (!dt) { document.getElementById('schedAlert').className='alert alert-error'; document.getElementById('schedAlert').textContent='Please select date and time.'; return; }
  const body = {
    applicationId: currentApp.appId,
    studentId: currentApp.studentId,
    jobId: currentApp.jobId,
    recruiterId: userId,
    dateTime: dt,
    venue: document.getElementById('intVenue').value,
    interviewType: document.getElementById('intType').value,
    meetingLink: document.getElementById('intVenue').value,
    notes: document.getElementById('intNotes').value
  };
  const res = await apiFetch('/api/interview/schedule', { method:'POST', body: JSON.stringify(body) });
  const data = await res.json();
  if (data.success) {
    closeSchedule();
    showToast('Interview scheduled! Student notified. 📅');
    const r = await apiFetch('/api/applications');
    const all = await r.json();
    const myJobIds = new Set(myJobs.map(j=>j.jobId));
    applications = all.filter(a=>myJobIds.has(a.jobId));
    renderAppsList(applications);
  }
}

init();
</script>
</body>
</html>
