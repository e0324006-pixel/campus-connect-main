<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Connect — All Jobs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
<script>
if (!requireAuth('ADMIN')) throw new Error();
const userId = getUserId(), role = getRole();
let notifications = [], jobs = [];

async function init() {
  const nr = await apiFetch(`/api/notifications?userId=${userId}`);
  notifications = nr ? await nr.json() : [];
  const unread = notifications.filter(n => !n.isRead).length;

  document.getElementById('root').innerHTML = `
    <div class="app-shell">
      ${renderHeader(getName(), role, unread)}
      ${renderSidebar(role)}
      <main class="main-content" id="mainContent"><div class="loading-spinner"></div></main>
    </div>
    ${renderNotifPanel(notifications)}
  `;

  const r = await apiFetch('/api/jobs');
  jobs = r ? await r.json() : [];
  renderPage();
}

function renderPage() {
  const open = jobs.filter(j => j.status === 'OPEN').length;
  const closed = jobs.filter(j => j.status === 'CLOSED').length;

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">
        <h2>💼 All Job Listings</h2>
        <p>${jobs.length} total • ${open} open • ${closed} closed</p>
      </div>
    </div>
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search jobs..." oninput="filterJobs()" />
      </div>
      <select class="filter-select" id="filterStatus" onchange="filterJobs()">
        <option value="">All Status</option>
        <option value="OPEN">Open</option>
        <option value="CLOSED">Closed</option>
      </select>
    </div>
    <div id="jobsList"></div>
  `;
  renderList(jobs);
}

function filterJobs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const filtered = jobs.filter(j => {
    const matchQ = !q || j.title.toLowerCase().includes(q) || j.companyName.toLowerCase().includes(q);
    const matchS = !status || j.status === status;
    return matchQ && matchS;
  });
  renderList(filtered);
}

function renderList(list) {
  const container = document.getElementById('jobsList');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">💼</div><h3>No jobs found</h3></div>`;
    return;
  }
  container.innerHTML = list.map(j => `
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;">
        <div class="job-company-logo">${j.companyName.charAt(0)}</div>
        <div style="flex:1;min-width:200px;">
          <div style="font-weight:700;font-size:1rem;">${j.title}</div>
          <div class="text-muted text-sm">${j.companyName} • ${j.location}</div>
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
            ${statusBadge(j.status)}
            ${statusBadge(j.jobType)}
            <span class="badge badge-applied">📋 ${(j.applicationIds||[]).length} applicants</span>
            <span class="text-xs text-muted">CTC: ${formatCTC(j.ctcMin, j.ctcMax)}</span>
          </div>
          <div class="job-skills" style="margin-top:8px;">
            ${(j.requiredSkills||[]).slice(0,4).map(s=>`<span class="skill-tag">${s}</span>`).join('')}
          </div>
        </div>
        <div>
          ${j.status === 'OPEN' ? `
            <button class="btn btn-warning btn-sm" onclick="closeJob('${j.jobId}', this)">Close Job</button>
          ` : '<span class="text-muted text-xs">Closed</span>'}
        </div>
      </div>
    </div>
  `).join('');
}

async function closeJob(jobId, btn) {
  if (!confirm('Close this job listing?')) return;
  btn.disabled = true;
  await apiFetch('/api/jobs/close', { method: 'POST', body: JSON.stringify({ jobId }) });
  showToast('Job closed.');
  const r = await apiFetch('/api/jobs');
  jobs = r ? await r.json() : [];
  filterJobs();
}

init();
</script>
</body>
</html>
