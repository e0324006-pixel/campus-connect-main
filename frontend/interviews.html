<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Connect — Interviews</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
<script>
if (!requireAuth()) throw new Error();
const userId = getUserId(), role = getRole();
let notifications = [], interviews = [];

async function init() {
  const nr = await apiFetch(`/api/notifications?userId=${userId}`);
  notifications = await nr.json();
  const unread = notifications.filter(n=>!n.isRead).length;

  document.getElementById('root').innerHTML = `
    <div class="app-shell">
      ${renderHeader(getName(), role, unread)}
      ${renderSidebar(role)}
      <main class="main-content" id="mainContent"><div class="loading-spinner"></div></main>
    </div>
    ${renderNotifPanel(notifications)}
  `;

  const param = role === 'STUDENT' ? `studentId=${userId}` : `recruiterId=${userId}`;
  const r = await apiFetch(`/api/interviews?${param}`);
  interviews = await r.json();
  renderPage();
}

function renderPage() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title"><h2>📅 Interviews</h2><p>${interviews.length} interview(s) scheduled</p></div>
    </div>
    <div id="list"></div>
  `;

  const container = document.getElementById('list');
  if (interviews.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><h3>No interviews scheduled</h3><p>${role==='STUDENT'?'Keep applying to jobs!':'Shortlist candidates to schedule interviews.'}</p></div>`;
    return;
  }

  container.innerHTML = interviews.map(iv => {
    const dt = new Date(iv.dateTime);
    const day = isNaN(dt) ? '?' : dt.getDate();
    const mon = isNaN(dt) ? '?' : dt.toLocaleString('en',{month:'short'});
    const time = isNaN(dt) ? iv.dateTime : dt.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    return `<div class="interview-card" style="margin-bottom:12px">
      <div class="interview-date">
        <div class="day">${day}</div>
        <div class="month">${mon}</div>
      </div>
      <div style="flex:1">
        <div style="font-weight:700">${role==='STUDENT'?iv.jobId:'Interview'}</div>
        <div class="text-muted text-sm" style="margin-top:2px">🕐 ${time} • ${iv.interviewType}</div>
        ${iv.venue ? `<div class="text-sm" style="margin-top:4px">📍 ${iv.venue}</div>` : ''}
        ${iv.meetingLink && iv.meetingLink.startsWith('http') ? `<a href="${iv.meetingLink}" target="_blank" class="btn btn-primary btn-sm" style="margin-top:8px;display:inline-flex">Join Meeting →</a>` : ''}
        ${iv.notes ? `<div style="margin-top:8px;padding:8px;background:var(--bg);border-radius:6px;font-size:.8rem;color:var(--text-muted)">📝 ${iv.notes}</div>` : ''}
      </div>
      <div>
        <span class="badge ${iv.status==='SCHEDULED'?'badge-interview':'badge-applied'}">${iv.status}</span>
      </div>
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
