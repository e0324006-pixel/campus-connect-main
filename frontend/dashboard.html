<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Connect — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
<script>
if (!requireAuth()) throw new Error('Not authenticated');

const role = getRole();
const userId = getUserId();
const name = getName();

let studentData = null, recruiterData = null, adminStats = null;
let notifications = [];

async function init() {
  // Load notifications
  try {
    const nr = await apiFetch(`/api/notifications?userId=${userId}`);
    notifications = await nr.json();
  } catch(e) {}

  const unread = notifications.filter(n => !n.isRead).length;
  document.getElementById('root').innerHTML = `
    <div class="app-shell">
      ${renderHeader(name, role, unread)}
      ${renderSidebar(role)}
      <main class="main-content" id="mainContent">
        <div class="loading-spinner"></div>
      </main>
    </div>
    ${renderNotifPanel(notifications)}
  `;

  if (role === 'STUDENT') await renderStudentDashboard();
  else if (role === 'RECRUITER') await renderRecruiterDashboard();
  else if (role === 'ADMIN') await renderAdminDashboard();
}

async function renderStudentDashboard() {
  const [profileRes, appsRes, jobsRes] = await Promise.all([
    apiFetch(`/api/profile/student?studentId=${userId}`),
    apiFetch(`/api/applications?studentId=${userId}`),
    apiFetch('/api/jobs')
  ]);
  const profile = await profileRes.json();
  const apps = await appsRes.json();
  const jobs = await jobsRes.json();

  const statusCounts = { APPLIED:0, SHORTLISTED:0, INTERVIEW_SCHEDULED:0, SELECTED:0, REJECTED:0 };
  apps.forEach(a => { if (statusCounts[a.status] !== undefined) statusCounts[a.status]++; });

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">
        <h2>👋 Welcome back, ${profile.name || name}!</h2>
        <p>${profile.department} • Year ${profile.year} • ${profile.college || 'College'}</p>
      </div>
      <button class="btn btn-primary" onclick="window.location.href='jobs.html'">Browse Jobs →</button>
    </div>

    ${!profile.profileComplete ? `
    <div class="alert alert-warning" style="margin-bottom:20px;">
      ⚠️ Your profile is incomplete. 
      <a href="profile.html" style="font-weight:700;margin-left:8px;">Complete it now →</a>
    </div>` : ''}

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">📋</div>
        <div><div class="stat-value">${apps.length}</div><div class="stat-label">Total Applied</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">⭐</div>
        <div><div class="stat-value">${statusCounts.SHORTLISTED + statusCounts.INTERVIEW_SCHEDULED}</div><div class="stat-label">Shortlisted</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div><div class="stat-value">${statusCounts.SELECTED}</div><div class="stat-label">Offers Received</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon indigo">💼</div>
        <div><div class="stat-value">${jobs.length}</div><div class="stat-label">Open Jobs</div></div>
      </div>
    </div>

    <div class="two-col">
      <!-- Profile Card -->
      <div class="card">
        <div class="card-title">👤 Your Profile <a href="profile.html" style="font-size:.8rem;margin-left:auto;">Edit →</a></div>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
          <div class="user-avatar" style="width:56px;height:56px;font-size:1.4rem;border-radius:14px;">
            ${(profile.name||name).charAt(0)}
          </div>
          <div>
            <div style="font-weight:700;font-size:1.05rem;">${profile.name||name}</div>
            <div class="text-muted text-sm">${profile.email}</div>
          </div>
          <div style="margin-left:auto;text-align:center;">
            <div class="cgpa-value">${profile.cgpa || '–'}</div>
            <div class="cgpa-label">CGPA</div>
          </div>
        </div>
        <div style="margin-bottom:12px;">
          <div class="text-xs text-muted fw-600" style="margin-bottom:6px;">SKILLS</div>
          <div class="job-skills">
            ${(profile.skills||[]).length > 0
              ? (profile.skills||[]).map(s => `<span class="skill-tag">${s}</span>`).join('')
              : '<span class="text-muted text-xs">No skills added</span>'}
          </div>
        </div>
        <div>
          <div class="text-xs text-muted fw-600" style="margin-bottom:4px;">PROFILE COMPLETENESS</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${profile.profileComplete ? 100 : 40}%"></div>
          </div>
          <div class="text-xs text-muted mt-1">${profile.profileComplete ? '✅ Complete' : '⚠️ Incomplete – add skills, phone, college, resume summary'}</div>
        </div>
      </div>

      <!-- Recent Applications -->
      <div class="card">
        <div class="card-title">📋 Recent Applications <a href="applications.html" style="font-size:.8rem;margin-left:auto;">View all →</a></div>
        ${apps.length === 0
          ? '<div class="empty-state" style="padding:24px"><div class="empty-icon">📋</div><p>No applications yet</p><a href="jobs.html" class="btn btn-primary btn-sm mt-3">Browse Jobs</a></div>'
          : apps.slice(0, 5).map(a => `
            <div class="applicant-row">
              <div class="applicant-avatar">${a.companyName.charAt(0)}</div>
              <div class="applicant-info">
                <div class="applicant-name">${a.jobTitle}</div>
                <div class="applicant-sub">${a.companyName} • ${formatDate(a.appliedDate)}</div>
              </div>
              ${statusBadge(a.status)}
            </div>`).join('')}
      </div>
    </div>

    <!-- Recommended Jobs Preview -->
    <div class="card mt-4">
      <div class="card-title">💡 Recommended for You <span class="card-subtitle"><a href="guidance.html">Career Guidance →</a></span></div>
      <div class="jobs-grid" id="recJobsGrid">
        <div class="loading-spinner" style="margin:16px auto;"></div>
      </div>
    </div>
  `;

  // Load recommended jobs
  try {
    const gr = await apiFetch(`/api/guidance?studentId=${userId}`);
    const guidance = await gr.json();
    const rec = (guidance.recommendedJobs || []).slice(0, 3);
    const grid = document.getElementById('recJobsGrid');
    if (rec.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="padding:24px;grid-column:1/-1"><p>No job recommendations yet</p></div>';
    } else {
      grid.innerHTML = rec.map(r => jobCardHtml(r, apps)).join('');
    }
  } catch(e) {
    document.getElementById('recJobsGrid').innerHTML = '<p class="text-muted">Could not load recommendations</p>';
  }
}

function jobCardHtml(r, apps) {
  const alreadyApplied = apps.some(a => a.jobId === r.jobId);
  return `<div class="job-card">
    <div class="job-card-header">
      <div class="job-company-logo">${r.company.charAt(0)}</div>
      <div style="flex:1">
        <div class="job-title">${r.title}</div>
        <div class="job-company">${r.company}</div>
      </div>
      ${statusBadge(alreadyApplied ? 'APPLIED' : 'OPEN')}
    </div>
    ${matchBar(r.matchScore)}
    ${r.missingSkills && r.missingSkills.length > 0 ? `
    <div>
      <div class="text-xs text-muted fw-600 mb-1">MISSING SKILLS</div>
      <div class="job-skills">${r.missingSkills.map(s => `<span class="skill-tag missing">+${s}</span>`).join('')}</div>
    </div>` : ''}
    <a href="jobs.html" class="btn btn-secondary btn-sm w-full">View Details</a>
  </div>`;
}

async function renderRecruiterDashboard() {
  const [profileRes, jobsRes, appsRes] = await Promise.all([
    apiFetch(`/api/profile/recruiter?recruiterId=${userId}`),
    apiFetch(`/api/jobs?recruiterId=${userId}`),
    apiFetch('/api/applications')
  ]);
  const profile = await profileRes.json();
  const jobs = await jobsRes.json();
  const allApps = await appsRes.json();

  const myApps = allApps.filter(a => jobs.some(j => j.jobId === a.jobId));
  const shortlisted = myApps.filter(a => a.status === 'SHORTLISTED' || a.status === 'INTERVIEW_SCHEDULED').length;
  const selected = myApps.filter(a => a.status === 'SELECTED').length;

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">
        <h2>🏢 ${profile.companyName || name}</h2>
        <p>${profile.industry} • Recruiter Dashboard</p>
      </div>
      <button class="btn btn-primary" onclick="window.location.href='post-job.html'">+ Post New Job</button>
    </div>

    ${!profile.isApproved ? `
    <div class="alert alert-warning">⏳ Your account is pending admin approval. You cannot post jobs yet.</div>` : ''}

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon indigo">💼</div>
        <div><div class="stat-value">${jobs.length}</div><div class="stat-label">Jobs Posted</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">📋</div>
        <div><div class="stat-value">${myApps.length}</div><div class="stat-label">Total Applicants</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">⭐</div>
        <div><div class="stat-value">${shortlisted}</div><div class="stat-label">Shortlisted</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div><div class="stat-value">${selected}</div><div class="stat-label">Selected</div></div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">💼 My Job Listings <a href="my-jobs.html" style="font-size:.8rem;margin-left:auto;">View all →</a></div>
        ${jobs.length === 0
          ? '<div class="empty-state" style="padding:24px"><div class="empty-icon">💼</div><p>No jobs posted yet</p><a href="post-job.html" class="btn btn-primary btn-sm mt-3">Post a Job</a></div>'
          : jobs.slice(0, 4).map(j => `
            <div class="applicant-row">
              <div class="applicant-avatar">${j.companyName.charAt(0)}</div>
              <div class="applicant-info">
                <div class="applicant-name">${j.title}</div>
                <div class="applicant-sub">${j.location} • ${j.applicationIds?.length || 0} applicants</div>
              </div>
              ${statusBadge(j.status)}
            </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title">📋 Recent Applicants <a href="applicants.html" style="font-size:.8rem;margin-left:auto;">View all →</a></div>
        ${myApps.length === 0
          ? '<div class="empty-state" style="padding:24px"><div class="empty-icon">👥</div><p>No applicants yet</p></div>'
          : myApps.slice(0, 5).map(a => `
            <div class="applicant-row">
              <div class="applicant-avatar">${a.studentId.charAt(3)}</div>
              <div class="applicant-info">
                <div class="applicant-name">${a.jobTitle}</div>
                <div class="applicant-sub">Applied ${formatDate(a.appliedDate)}</div>
              </div>
              ${statusBadge(a.status)}
            </div>`).join('')}
      </div>
    </div>
  `;
}

async function renderAdminDashboard() {
  const [statsRes, usersRes] = await Promise.all([
    apiFetch('/api/admin/stats'),
    apiFetch('/api/admin/users')
  ]);
  const stats = await statsRes.json();
  const users = await usersRes.json();

  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">
        <h2>⚙️ Admin Dashboard</h2>
        <p>Platform overview and management</p>
      </div>
      <button class="btn btn-accent" onclick="window.location.href='admin-broadcast.html'">📣 Broadcast</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon indigo">🎓</div>
        <div><div class="stat-value">${stats.totalStudents}</div><div class="stat-label">Students</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">🏢</div>
        <div><div class="stat-value">${stats.totalRecruiters}</div><div class="stat-label">Recruiters</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">💼</div>
        <div><div class="stat-value">${stats.openJobs}</div><div class="stat-label">Open Jobs</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div><div class="stat-value">${stats.placed}</div><div class="stat-label">Students Placed</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">📈</div>
        <div><div class="stat-value">${stats.placementRate}%</div><div class="stat-label">Placement Rate</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">💰</div>
        <div><div class="stat-value">${stats.avgCtcLpa} LPA</div><div class="stat-label">Avg CTC</div></div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">🏢 Companies by Jobs Posted</div>
        ${(stats.jobsByCompany||[]).map(c => `
          <div class="applicant-row">
            <div class="applicant-avatar">${c.company.charAt(0)}</div>
            <div class="applicant-info">
              <div class="applicant-name">${c.company}</div>
              <div class="applicant-sub">${c.jobs} job${c.jobs>1?'s':''} posted</div>
            </div>
          </div>`).join('') || '<p class="text-muted">No data</p>'}
      </div>
      <div class="card">
        <div class="card-title">⏳ Pending Recruiter Approvals
          <a href="admin-recruiters.html" style="font-size:.8rem;margin-left:auto;">View all →</a>
        </div>
        ${(users.recruiters||[]).filter(r=>!r.isApproved).length === 0
          ? '<div class="empty-state" style="padding:16px"><p>No pending approvals 🎉</p></div>'
          : (users.recruiters||[]).filter(r=>!r.isApproved).slice(0,5).map(r => `
            <div class="applicant-row">
              <div class="applicant-avatar">${r.companyName.charAt(0)}</div>
              <div class="applicant-info">
                <div class="applicant-name">${r.companyName}</div>
                <div class="applicant-sub">${r.name} • ${r.industry}</div>
              </div>
              <div class="applicant-actions">
                <button class="btn btn-success btn-sm" onclick="approveRec('${r.userId}', this)">✅</button>
                <button class="btn btn-danger btn-sm" onclick="rejectRec('${r.userId}', this)">❌</button>
              </div>
            </div>`).join('')}
      </div>
    </div>
  `;
}

async function approveRec(id, btn) {
  btn.disabled = true;
  await apiFetch('/api/admin/approve', { method:'POST', body: JSON.stringify({ recruiterId: id, action: 'approve' }) });
  showToast('Recruiter approved!');
  btn.closest('.applicant-row').remove();
}
async function rejectRec(id, btn) {
  btn.disabled = true;
  await apiFetch('/api/admin/approve', { method:'POST', body: JSON.stringify({ recruiterId: id, action: 'reject' }) });
  showToast('Recruiter rejected.', 'info');
  btn.closest('.applicant-row').remove();
}

init();
</script>
</body>
</html>
