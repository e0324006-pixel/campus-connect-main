<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Connect — All Students</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
<script>
if (!requireAuth('ADMIN')) throw new Error();
const userId = getUserId(), role = getRole();
let notifications = [], students = [];

async function init() {
  const nr = await apiFetch(`/api/notifications?userId=${userId}`);
  notifications = nr ? await nr.json() : [];
  const unread = notifications.filter(n => !n.isRead).length;

  document.getElementById('root').innerHTML = `
    <div class="app-shell">
      ${renderHeader(getName(), role, unread)}
      ${renderSidebar(role)}
      <main class="main-content" id="mainContent"><div class="loading-spinner"></div></main>
    </div>
    ${renderNotifPanel(notifications)}
  `;

  const r = await apiFetch('/api/admin/users?role=STUDENT');
  const data = r ? await r.json() : {};
  students = data.students || [];
  renderPage();
}

function renderPage() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-header">
      <div class="page-title">
        <h2>🎓 All Students</h2>
        <p>${students.length} registered students</p>
      </div>
    </div>
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search by name, department, skills..." oninput="filterStudents()" />
      </div>
      <select class="filter-select" id="filterDept" onchange="filterStudents()">
        <option value="">All Departments</option>
        <option value="Computer Science">CS</option>
        <option value="Information Technology">IT</option>
        <option value="Electronics">ECE</option>
        <option value="Mechanical">Mechanical</option>
      </select>
    </div>
    <div id="studentsList"></div>
  `;
  renderList(students);
}

function filterStudents() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const dept = document.getElementById('filterDept').value;
  const filtered = students.filter(s => {
    const matchQ = !q || s.name.toLowerCase().includes(q)
      || (s.department||'').toLowerCase().includes(q)
      || (s.skills||[]).some(sk => sk.toLowerCase().includes(q));
    const matchDept = !dept || (s.department||'').includes(dept);
    return matchQ && matchDept;
  });
  renderList(filtered);
}

function renderList(list) {
  const container = document.getElementById('studentsList');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎓</div><h3>No students found</h3></div>`;
    return;
  }
  container.innerHTML = `
    <div class="card" style="padding:0;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:var(--bg);border-bottom:2px solid var(--border);">
            <th style="padding:12px 16px;text-align:left;font-size:.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">Student</th>
            <th style="padding:12px 16px;text-align:left;font-size:.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">Department</th>
            <th style="padding:12px 16px;text-align:left;font-size:.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">CGPA</th>
            <th style="padding:12px 16px;text-align:left;font-size:.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">Year</th>
            <th style="padding:12px 16px;text-align:left;font-size:.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">Skills</th>
            <th style="padding:12px 16px;text-align:left;font-size:.75rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">Profile</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(s => `
            <tr style="border-bottom:1px solid var(--border);" onmouseenter="this.style.background='var(--bg)'" onmouseleave="this.style.background=''">
              <td style="padding:12px 16px;">
                <div style="display:flex;align-items:center;gap:10px;">
                  <div class="user-avatar" style="width:36px;height:36px;font-size:.875rem;border-radius:10px;flex-shrink:0">${s.name.charAt(0)}</div>
                  <div>
                    <div style="font-weight:600;font-size:.9rem">${s.name}</div>
                    <div class="text-muted text-xs">${s.email}</div>
                  </div>
                </div>
              </td>
              <td style="padding:12px 16px;font-size:.875rem">${s.department || '—'}</td>
              <td style="padding:12px 16px;">
                <span style="font-weight:700;color:${s.cgpa >= 8 ? 'var(--success)' : s.cgpa >= 7 ? 'var(--warning)' : 'var(--danger)'}">
                  ${s.cgpa || '—'}
                </span>
              </td>
              <td style="padding:12px 16px;font-size:.875rem">Year ${s.year || '—'}</td>
              <td style="padding:12px 16px;">
                <div style="display:flex;gap:4px;flex-wrap:wrap;max-width:200px;">
                  ${(s.skills||[]).slice(0,3).map(sk => `<span class="skill-tag" style="font-size:.7rem;padding:2px 6px">${sk}</span>`).join('')}
                  ${(s.skills||[]).length > 3 ? `<span class="text-muted text-xs">+${(s.skills||[]).length-3}</span>` : ''}
                </div>
              </td>
              <td style="padding:12px 16px;">
                ${s.profileComplete
                  ? '<span class="badge badge-selected">✅ Complete</span>'
                  : '<span class="badge badge-applied">⚠️ Incomplete</span>'}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

init();
</script>
</body>
</html>
